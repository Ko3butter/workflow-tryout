name: k3dziomo

on:
  push:
    branches:
      - main
      
jobs:
  setup-k3d:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install brew
        run: brew install wget
      - name: k3d install
        run: brew install k3d
      - name: check up
        run: |
          k3d --version
          k3d cluster create my-cluster
          k3d cluster list
          echo dziala :3
      
           
