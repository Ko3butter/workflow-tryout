name: Detect, verify YAML Changes and configure K3d
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  detect-repo-changes:
    runs-on: ubuntu-latest
    outputs:
      yaml-changed: ${{ steps.changes.outputs.repo }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect YAML changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            repo:
              - 'configs/*.yaml'

  yamllint:
    runs-on: ubuntu-latest
    needs: detect-repo-changes
    if: ${{ needs.detect-repo-changes.outputs.yaml-changed == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: configs/*.yaml
          strict: true

        
  k3d-config:
    name: k3d setup
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
        - run: |
            wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
        - run: |
            k3d cluster create my-cluster
            kubectl apply -f .
          working-directory: configs
  check-status:
     name: check status
     runs-on: ubuntu-latest
     needs: k3d-config
     steps:
       - run: |
           kubectl wait -n default pods --for=condition=Ready --timeout=120s
           kubectl get pods -A
           kubectl get deploy -A
           kubectl get svc -A


        
      


    